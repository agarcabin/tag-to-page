name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Validate release metadata
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          node -e "const fs=require('fs'); const manifest=JSON.parse(fs.readFileSync('manifest.json','utf8')); if (manifest.version !== process.env.RELEASE_VERSION) { throw new Error('manifest version does not match tag'); }"

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp main.js manifest.json styles.css release-assets/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tag-to-page-${{ github.ref_name }}
          path: release-assets

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-assets/*

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
